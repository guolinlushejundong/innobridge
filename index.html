<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InnoLink</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Contrast fix for legacy dark blocks still in page */
    .bg-slate-950,
    .bg-slate-900,
    .bg-slate-900\/95,
    .bg-slate-900\/90,
    .bg-slate-900\/75,
    .bg-slate-900\/70,
    .bg-slate-950\/60 {
      background-color: #ffffff !important;
    }
    .text-slate-100,
    .text-slate-200,
    .text-slate-300,
    .text-slate-400,
    .text-white {
      color: #0f172a !important;
    }
    .border-slate-700,
    .border-slate-800 {
      border-color: #d1d5db !important;
    }
    .bg-slate-800 {
      background-color: #f8fafc !important;
    }
    .modal-fade {
      animation: modalFadeIn 180ms ease-out;
    }
    .modal-panel {
      animation: modalSlideUp 220ms ease-out;
    }
    .post-pop {
      animation: postPop 1.1s ease-out;
    }
    .nda-locked {
      position: relative;
      overflow: hidden;
    }
    .nda-locked .nda-content {
      filter: blur(7px);
      user-select: none;
      pointer-events: none;
    }
    .nda-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .nda-unlocked .nda-content {
      filter: none;
      pointer-events: auto;
      user-select: auto;
    }
    .nda-unlocked .nda-overlay {
      display: none;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes postPop {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.35); background-color: #eff6ff; }
      100% { box-shadow: 0 0 0 10px rgba(59,130,246,0); background-color: #ffffff; }
    }
    @media (max-width: 768px) {
      #panel.mobile-open {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex !important;
        flex-direction: column;
        background: #ffffff;
      }
      #panel.mobile-open #msgs {
        height: calc(100vh - 220px);
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white">
    <div class="mx-auto flex h-14 w-[94%] max-w-7xl items-center justify-between">
      <h1 class="font-semibold">InnoLink</h1>
      <nav class="flex items-center gap-2 text-sm">
        <button class="tab rounded px-2 py-1 bg-blue-600 text-white" data-page="home">首页</button>
        <button class="tab rounded px-2 py-1 border" data-page="hall">大厅</button>
        <button class="tab rounded px-2 py-1 border" data-page="publish">发布</button>
        <button class="tab rounded px-2 py-1 border" data-page="chat">沟通</button>
      </nav>
      <div class="flex items-center gap-2">
        <span id="who" class="text-xs text-slate-500"></span>
        <button id="authOpen" class="rounded border px-2 py-1 text-sm">登录/注册</button>
        <button id="logout" class="hidden rounded bg-slate-900 px-2 py-1 text-sm text-white">退出</button>
      </div>
    </div>
  </header>

  <main class="mx-auto w-[94%] max-w-7xl py-6">
    <section id="home" class="page">
      <div class="rounded-xl border bg-white p-4">
        <h2 class="text-2xl font-bold">创新成果撮合平台</h2>
        <p class="mt-2 text-slate-600">支持注册登录、发布内容与专门沟通页面。</p>
      </div>
      <div class="mt-4 rounded-xl border bg-white p-4">
        <h3 class="mb-3 font-semibold">最新内容</h3>
        <div id="homeList" class="grid gap-3 md:grid-cols-2"></div>
      </div>
    </section>

    <section id="publish" class="page hidden">
      <div class="rounded-xl border bg-white p-4">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h3 class="text-lg font-semibold">发布中心</h3>
            <p class="text-sm text-slate-500">分别发布创意和需求，提交后立即在列表首位展示。</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button id="openIdeaModal" class="rounded-lg bg-blue-600 px-3 py-2 text-sm text-white shadow-sm">发布创意</button>
            <button id="openDemandModal" class="rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">发布需求</button>
          </div>
        </div>
      </div>
      <div class="mt-4 grid gap-4 lg:grid-cols-2">
        <div class="rounded-xl border bg-white p-4">
          <h3 class="mb-3 font-semibold">我发布的创意</h3>
          <div id="mineIdeaList" class="space-y-2"></div>
        </div>
        <div class="rounded-xl border bg-white p-4">
          <h3 class="mb-3 font-semibold">我发布的需求</h3>
          <div id="mineDemandList" class="space-y-2"></div>
        </div>
      </div>
    </section>

    <section id="hall" class="page hidden">
      <div class="rounded-xl border bg-white p-4">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h3 class="text-lg font-semibold">创新帖子展示大厅</h3>
            <p class="text-sm text-slate-500">信息流式帖子展示，支持分类筛选和关键词搜索。</p>
          </div>
          <button class="tab rounded bg-blue-600 px-3 py-1.5 text-sm text-white" data-page="publish">去发布</button>
        </div>
        <div class="mt-4 grid gap-2 md:grid-cols-3">
          <select id="hallCategory" class="rounded border px-2 py-2 text-sm">
            <option value="全部">全部分类</option>
            <option>硬科技</option>
            <option>生物医药</option>
            <option>AI应用</option>
          </select>
          <input id="hallKeyword" class="rounded border px-2 py-2 text-sm md:col-span-2" placeholder="搜索标题、简介、发布者" />
        </div>
      </div>
      <div id="hallList" class="mt-4 grid gap-3 md:grid-cols-2 xl:grid-cols-3"></div>
    </section>

    <section id="chat" class="page hidden">
      <div class="grid gap-4 lg:grid-cols-12">
        <aside class="rounded-xl border bg-white p-3 lg:col-span-4">
          <input id="chatSearch" class="mb-2 w-full rounded border px-2 py-2 text-sm" placeholder="搜索会话" />
          <div id="chatList" class="space-y-2"></div>
        </aside>
        <section class="rounded-xl border bg-white lg:col-span-8">
          <div id="empty" class="flex h-[420px] items-center justify-center text-slate-400">请选择会话</div>
          <div id="panel" class="hidden">
            <div class="border-b px-3 py-2">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <h4 id="chatName" class="text-sm font-semibold"></h4>
                  <p id="chatMeta" class="text-xs text-slate-500"></p>
                </div>
                <span id="chatRole" class="rounded-full bg-violet-50 px-2.5 py-1 text-xs text-violet-700"></span>
              </div>
              <button id="closeChatMobile" class="mt-2 hidden rounded border px-2 py-1 text-xs md:hidden">关闭对话</button>
            </div>
            <div id="msgs" class="h-[320px] space-y-2 overflow-y-auto bg-slate-50 p-3"></div>
            <div class="border-t p-3">
              <div class="mb-2 flex items-center gap-2">
                <button id="attachBtn" type="button" class="rounded border px-2 py-1 text-xs" title="发送附件">📎 发送附件</button>
                <input id="file" type="file" class="hidden" />
                <span id="fileName" class="text-xs text-slate-500"></span>
              </div>
              <div id="quickReplies" class="mb-2 flex flex-wrap gap-2"></div>
              <div class="flex gap-2">
                <input id="msgInput" class="w-full rounded border px-2 py-2 text-sm" placeholder="输入消息，回车发送" />
                <button id="send" class="rounded bg-blue-600 px-3 py-2 text-sm text-white">发送</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="authModal" class="fixed inset-0 hidden items-center justify-center bg-slate-900/40 p-4">
    <div class="w-full max-w-sm rounded-xl border bg-white p-4">
      <div class="mb-2 flex items-center justify-between">
        <h3 id="authTitle" class="font-semibold">登录</h3>
        <button id="authClose" class="rounded border px-2 py-1 text-xs">关闭</button>
      </div>
      <form id="authForm" class="space-y-2">
        <input id="u" class="w-full rounded border px-2 py-2 text-sm" placeholder="用户名" />
        <input id="p" type="password" class="w-full rounded border px-2 py-2 text-sm" placeholder="密码" />
        <button class="w-full rounded bg-blue-600 px-3 py-2 text-sm text-white">确认</button>
      </form>
      <button id="switchAuth" class="mt-2 text-sm text-blue-600">还没有账号？去注册</button>
    </div>
  </div>

  <div id="ideaModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-slate-900/40 p-4">
    <div class="modal-panel w-full max-w-lg rounded-2xl border bg-white p-4 shadow-xl">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="font-semibold">发布创意</h3>
        <button class="closePublishModal rounded border px-2 py-1 text-xs" data-modal="ideaModal">关闭</button>
      </div>
      <form id="ideaForm" class="space-y-2">
        <input id="ideaTitle" class="w-full rounded border px-2 py-2 text-sm" placeholder="创意标题" />
        <select id="ideaCategory" class="w-full rounded border px-2 py-2 text-sm">
          <option value="">选择分类</option>
          <option>硬科技</option>
          <option>生物医药</option>
          <option>AI应用</option>
        </select>
        <textarea id="ideaDesc" class="w-full rounded border px-2 py-2 text-sm" rows="4" placeholder="创意简介"></textarea>
        <label class="block rounded border border-dashed px-3 py-2 text-sm text-slate-600">
          上传附件/图片
          <input id="ideaFiles" type="file" multiple class="mt-1 block w-full text-xs" />
        </label>
        <div id="ideaFilesPreview" class="text-xs text-slate-500"></div>
        <button class="w-full rounded bg-blue-600 px-3 py-2 text-sm text-white">立即发布创意</button>
      </form>
    </div>
  </div>

  <div id="demandModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-slate-900/40 p-4">
    <div class="modal-panel w-full max-w-lg rounded-2xl border bg-white p-4 shadow-xl">
      <div class="mb-3 flex items-center justify-between">
        <h3 class="font-semibold">发布需求</h3>
        <button class="closePublishModal rounded border px-2 py-1 text-xs" data-modal="demandModal">关闭</button>
      </div>
      <form id="demandForm" class="space-y-2">
        <input id="demandTitle" class="w-full rounded border px-2 py-2 text-sm" placeholder="需求标题" />
        <select id="demandCategory" class="w-full rounded border px-2 py-2 text-sm">
          <option value="">选择分类</option>
          <option>硬科技</option>
          <option>生物医药</option>
          <option>AI应用</option>
        </select>
        <textarea id="demandDesc" class="w-full rounded border px-2 py-2 text-sm" rows="4" placeholder="需求描述"></textarea>
        <label class="block rounded border border-dashed px-3 py-2 text-sm text-slate-600">
          上传附件/图片
          <input id="demandFiles" type="file" multiple class="mt-1 block w-full text-xs" />
        </label>
        <div id="demandFilesPreview" class="text-xs text-slate-500"></div>
        <button class="w-full rounded bg-emerald-600 px-3 py-2 text-sm text-white">立即发布需求</button>
      </form>
    </div>
  </div>

  <div id="postDetailModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-slate-900/40 p-4">
    <div class="modal-panel w-full max-w-2xl rounded-2xl border bg-white p-4 shadow-xl">
      <div class="mb-2 flex items-center justify-between">
        <h3 class="font-semibold">帖子详情</h3>
        <button id="closePostDetail" class="rounded border px-2 py-1 text-xs">关闭</button>
      </div>
      <div id="postDetailBody" class="space-y-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script>
    var SUPABASE_URL = "YOUR_SUPABASE_URL";
    var SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

    var KEY = "innolink_v3";
    var db = JSON.parse(localStorage.getItem(KEY) || "{}");
    function defaultLocalDb(){
      if (!db.users) db.users = [];
      if (db.current === undefined) db.current = null;
      if (!db.posts || !db.posts.length) db.posts = [{ id: "p1", author: "平台示例", title: "AI 农业传感器", category: "AI应用", desc: "寻找合作企业", ts: Date.now(), postType: "idea", badge: "刚刚发布", attachments: [], allowDownloadAll: false, downloadRequests: [], approvedUsers: [], ndaSignedUsers: [], ndaSignLogs: [] }];
      if (!db.chats || !db.chats.length) db.chats = [{ id: "c1", name: "平台顾问", role: "企业创新主管", project: "平台咨询", online: true, unread: 1, messages: [{ side: "left", text: "欢迎使用 InnoLink", read: false, ts: Date.now() }] }];
    }
    defaultLocalDb();

    var sb = null;
    try {
      var SB = typeof supabase !== "undefined" ? supabase : (typeof window !== "undefined" ? window.supabase : null);
      if (SB && SB.createClient && SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_URL.indexOf("YOUR_") !== 0 && SUPABASE_ANON_KEY.indexOf("YOUR_") !== 0) {
        sb = SB.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch (e) { sb = null; }

    var authMode = "login", activeChatId = "", pendingFile = "", recentPostId = "", activePostId = "";
    var pendingIdeaAttachments = [], pendingDemandAttachments = [];
    var api = {
      save: function() { localStorage.setItem(KEY, JSON.stringify(db)); return Promise.resolve(); }
    };

    function syntheticEmail(username){ return (username || "").trim().toLowerCase().replace(/\s+/g, "_") + "@innolink.local"; }
    function defaultMeta(){
      return { attachments: [], allow_download_all: false, download_requests: [], approved_users: [], nda_signed_users: [], nda_sign_logs: [] };
    }
    function rowToPost(r){
      var m = r.meta || {};
      return {
        id: r.id,
        author: r.author_name,
        title: r.title,
        category: r.category,
        desc: r.description,
        ts: new Date(r.created_at).getTime(),
        postType: r.post_type,
        badge: r.badge || "",
        attachments: m.attachments || [],
        allowDownloadAll: !!m.allow_download_all,
        downloadRequests: m.download_requests || [],
        approvedUsers: m.approved_users || [],
        ndaSignedUsers: m.nda_signed_users || [],
        ndaSignLogs: m.nda_sign_logs || [],
        author_id: r.author_id
      };
    }
    function metaFromPost(p){
      return {
        attachments: p.attachments || [],
        allow_download_all: !!p.allowDownloadAll,
        download_requests: p.downloadRequests || [],
        approved_users: p.approvedUsers || [],
        nda_signed_users: p.ndaSignedUsers || [],
        nda_sign_logs: p.ndaSignLogs || []
      };
    }
    function rowToChat(r){
      return {
        id: r.id,
        name: r.peer_display_name,
        project: r.project_title,
        role: r.role || inferRole(r.peer_display_name),
        online: !!r.online,
        unread: r.unread_count || 0,
        messages: [],
        _messagesLoaded: false
      };
    }

    function fetchPostsFromSb(){
      if (!sb) return Promise.resolve();
      return sb.from("posts").select("*").order("created_at", { ascending: false }).then(function(res){
        if (res.error) { console.error(res.error); return; }
        db.posts = (res.data || []).map(rowToPost);
      });
    }
    function fetchChatsFromSb(){
      if (!sb) return Promise.resolve();
      return sb.from("chats").select("*").order("created_at", { ascending: false }).then(function(res){
        if (res.error) { console.error(res.error); return; }
        db.chats = (res.data || []).map(rowToChat);
      });
    }
    function loadMessagesForChat(chatId){
      if (!sb) return Promise.resolve();
      return sb.from("chat_messages").select("*").eq("chat_id", chatId).order("created_at", { ascending: true }).then(function(res){
        if (res.error) { console.error(res.error); return; }
        var c = db.chats.find(function(x){ return x.id === chatId; });
        if (!c) return;
        c.messages = (res.data || []).map(function(m){
          return { side: m.sender_display_name === db.current ? "right" : "left", text: m.body, read: !!m.read, ts: new Date(m.created_at).getTime() };
        });
        c._messagesLoaded = true;
      });
    }
    function persistPostMeta(p){
      if (!sb) return api.save();
      return sb.from("posts").update({ meta: metaFromPost(p) }).eq("id", p.id).then(function(res){
        if (res.error) alert(res.error.message);
        return fetchPostsFromSb();
      });
    }
    function refreshAllFromSb(){
      if (!sb) return Promise.resolve();
      return fetchPostsFromSb().then(fetchChatsFromSb);
    }
    async function ensureProfile(username){
      if (!sb) return;
      var u = await sb.auth.getUser();
      var uid = u.data.user && u.data.user.id;
      if (!uid) return;
      var res = await sb.from("profiles").upsert({ id: uid, username: username }, { onConflict: "id" });
      if (res.error) console.error(res.error);
    }
    async function hydrateUserFromSession(session){
      if (!sb || !session || !session.user) { db.current = null; return; }
      var r = await sb.from("profiles").select("username").eq("id", session.user.id).maybeSingle();
      if (r.data && r.data.username) {
        db.current = r.data.username;
      } else {
        var localPart = (session.user.email || "").split("@")[0];
        db.current = localPart || null;
        if (db.current) await ensureProfile(db.current);
      }
    }

    function fmt(t){return new Date(t).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});}
    function id(p){return p+"_"+Math.random().toString(36).slice(2,8);}
    function mustLogin(){ if(!db.current){ alert("请先登录"); openAuth("login"); return false; } return true; }
    function setPage(page){ document.querySelectorAll(".page").forEach(function(x){x.classList.add("hidden");}); document.getElementById(page).classList.remove("hidden"); document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("bg-blue-600","text-white");t.classList.add("border"); if(t.dataset.page===page){t.classList.add("bg-blue-600","text-white");t.classList.remove("border");}}); }
    function authState(){ document.getElementById("who").textContent = db.current ? ("当前: "+db.current) : ""; document.getElementById("logout").classList.toggle("hidden", !db.current); }

    function inferRole(name){
      if ((name || "").includes("专利")) return "专利持有者";
      if ((name || "").includes("顾问")) return "企业创新主管";
      return "企业创新主管";
    }

    function badgeHtml(type, text){
      if (!text) return "";
      var style = type === "demand" ? "bg-amber-50 text-amber-700" : "bg-emerald-50 text-emerald-700";
      return '<span class="rounded-full px-2 py-0.5 text-[11px] '+style+'">'+text+'</span>';
    }

    function postHtml(p,mine){
      var actions = mine ? '<div class="mt-2 flex gap-1"><button class="edit border rounded px-2 py-1 text-xs" data-id="'+p.id+'">编辑</button><button class="del border rounded px-2 py-1 text-xs text-rose-700 border-rose-200 bg-rose-50" data-id="'+p.id+'">删除</button><button class="tochat border rounded px-2 py-1 text-xs" data-name="'+p.author+'" data-project="'+p.title+'">沟通</button><button class="viewpost border rounded px-2 py-1 text-xs" data-id="'+p.id+'">查看帖子</button></div>' : '<div class="mt-2 flex gap-1"><button class="tochat border rounded px-2 py-1 text-xs" data-name="'+p.author+'" data-project="'+p.title+'">沟通</button><button class="viewpost border rounded px-2 py-1 text-xs" data-id="'+p.id+'">查看帖子</button></div>';
      var pop = p.id === recentPostId ? " post-pop" : "";
      return '<div class="rounded border p-3'+pop+'" data-post-id="'+p.id+'"><div class="flex items-center justify-between text-xs"><div class="flex items-center gap-2"><span class="rounded bg-blue-50 px-2 py-1 text-blue-700">'+p.category+'</span>'+badgeHtml(p.postType, p.badge)+'</div><span class="text-slate-500">'+new Date(p.ts).toLocaleString()+'</span></div><h4 class="mt-2 font-semibold">'+p.title+'</h4><p class="text-sm text-slate-600">'+p.desc+'</p><p class="mt-1 text-xs text-slate-500">发布者: '+p.author+'</p>'+actions+'</div>';
    }

    function renderPosts(){
      var posts = db.posts.slice().sort(function(a,b){return b.ts-a.ts;});
      document.getElementById("homeList").innerHTML = posts.map(function(p){return postHtml(p,false);}).join("") || '<p class="text-sm text-slate-500">暂无</p>';
      var mine = db.current ? posts.filter(function(p){return p.author===db.current;}) : [];
      var mineIdeas = mine.filter(function(p){ return (p.postType || "idea") === "idea"; });
      var mineDemands = mine.filter(function(p){ return p.postType === "demand"; });
      document.getElementById("mineIdeaList").innerHTML = mineIdeas.map(function(p){return postHtml(p,true);}).join("") || '<p class="text-sm text-slate-500">暂无创意发布</p>';
      document.getElementById("mineDemandList").innerHTML = mineDemands.map(function(p){return postHtml(p,true);}).join("") || '<p class="text-sm text-slate-500">暂无需求发布</p>';
      document.querySelectorAll(".tochat").forEach(function(b){ b.addEventListener("click", function(){ if(!mustLogin()) return; openOrCreateChat(b.dataset.name,b.dataset.project); setPage("chat"); });});
      document.querySelectorAll(".viewpost").forEach(function(b){ b.addEventListener("click", function(){ openPostDetail(b.dataset.id); });});

    function openOrCreateChat(name,project){

              peer_display_name: name,
              project_title: project,
              role: inferRole(name),
              online: Math.random() > 0.35,
              unread_count: 0
            }).select("*").single();
            if (ins.error) { alert(ins.error.message); return; }

              body: "您好，已收到沟通申请。",
              read: true
            });

          }
          await fetchChatsFromSb();
          await loadMessagesForChat(activeChatId);
          renderChats();

      var c=db.chats.find(function(x){return x.name===name&&x.project===project;});
      if(!c){ c={id:id("c"),name:name,role:inferRole(name),project:project,online:Math.random()>0.35,unread:0,messages:[{side:"left",text:"您好，已收到沟通申请。",read:true,ts:Date.now()}]}; db.chats.push(c); api.save(); }
      activeChatId=c.id; renderChats(); renderActive();

    function filesToData(files){
      return Promise.all(Array.from(files || []).map(function(file){
        return new Promise(function(resolve){
          var reader = new FileReader();
          reader.onload = function(){ resolve({ name: file.name, type: file.type, size: file.size, dataUrl: reader.result }); };
          reader.readAsDataURL(file);
        });
      }));
    }

    function savePost(postType, title, category, desc, attachments){
      if(!mustLogin()) return;
      if(!title||!category||!desc) return alert("请完整填写");
      if (sb) {
        (async function(){
          var u = await sb.auth.getUser();
          var uid = u.data.user && u.data.user.id;
          if (!uid) { alert("请先登录"); return; }
          if(db.editId){
            var p=db.posts.find(function(x){return x.id===db.editId;});
            if(!p) return;
            var nextAtt = attachments && attachments.length ? attachments : (p.attachments || []);
            var res = await sb.from("posts").update({
              title: title,
              category: category,
              description: desc,
              post_type: postType,
              meta: Object.assign({}, metaFromPost(p), { attachments: nextAtt })
            }).eq("id", db.editId);
            if (res.error) { alert(res.error.message); return; }
          } else {
            var ins = await sb.from("posts").insert({
              author_id: uid,
              author_name: db.current,
              title: title,
              category: category,
              description: desc,
              post_type: postType,
              badge: postType==="demand" ? "待审核" : "刚刚发布",
              meta: Object.assign(defaultMeta(), { attachments: attachments || [] })
            }).select("id").single();
            if (ins.error) { alert(ins.error.message); return; }
            recentPostId = ins.data.id;
          }
          db.editId = "";
          await fetchPostsFromSb();
          renderPosts();
          if (recentPostId) setTimeout(function(){ recentPostId = ""; renderPosts(); }, 1200);
        })();
        return;
      }
      if(db.editId){
        var p=db.posts.find(function(x){return x.id===db.editId;});
        if(p){ p.title=title; p.category=category; p.desc=desc; p.postType=postType; p.attachments = attachments && attachments.length ? attachments : (p.attachments || []); }
      } else {
        var newId = id("p");
        recentPostId = newId;
        db.posts.push({id:newId,author:db.current,title:title,category:category,desc:desc,ts:Date.now(),postType:postType,badge:postType==="demand"?"待审核":"刚刚发布",attachments:attachments || [],allowDownloadAll:false,downloadRequests:[],approvedUsers:[],ndaSignedUsers:[],ndaSignLogs:[]});
      }
      db.editId = "";
      api.save().then(function(){
        renderPosts();
        if (recentPostId) setTimeout(function(){ recentPostId = ""; renderPosts(); }, 1200);
      });
    }

      filesToData(document.getElementById("ideaFiles").files).then(function(list){
        var finalFiles = list.length ? list : pendingIdeaAttachments;
        savePost("idea", document.getElementById("ideaTitle").value.trim(), document.getElementById("ideaCategory").value, document.getElementById("ideaDesc").value.trim(), finalFiles);
        closeModal("ideaModal"); document.getElementById("ideaForm").reset(); pendingIdeaAttachments = []; document.getElementById("ideaFilesPreview").textContent = "";
      });
    });
    document.getElementById("demandForm").addEventListener("submit",function(e){
      e.preventDefault();
      filesToData(document.getElementById("demandFiles").files).then(function(list){
        var finalFiles = list.length ? list : pendingDemandAttachments;
        savePost("demand", document.getElementById("demandTitle").value.trim(), document.getElementById("demandCategory").value, document.getElementById("demandDesc").value.trim(), finalFiles);
        closeModal("demandModal"); document.getElementById("demandForm").reset(); pendingDemandAttachments = []; document.getElementById("demandFilesPreview").textContent = "";
      });
    });
    document.getElementById("chatSearch").addEventListener("input",renderChats);
    document.getElementById("hallCategory").addEventListener("change",renderHall);
    document.getElementById("hallKeyword").addEventListener("input",renderHall);
    document.getElementById("send").addEventListener("click",send);
    document.getElementById("msgInput").addEventListener("keydown",function(e){ if(e.key==="Enter") send(); });
    document.getElementById("attachBtn").addEventListener("click", function(){ document.getElementById("file").click(); });
    document.getElementById("file").addEventListener("change",function(e){ var f=e.target.files[0]; if(!f) return; pendingFile=f.name; document.getElementById("fileName").textContent="已选择: "+f.name; });
    document.getElementById("authModal").addEventListener("click",function(e){ if(e.target.id==="authModal") closeAuth(); });
    document.getElementById("ideaModal").addEventListener("click",function(e){ if(e.target.id==="ideaModal") closeModal("ideaModal"); });
    document.getElementById("demandModal").addEventListener("click",function(e){ if(e.target.id==="demandModal") closeModal("demandModal"); });
    document.getElementById("closePostDetail").addEventListener("click", closePostDetail);
    document.getElementById("postDetailModal").addEventListener("click", function(e){ if(e.target.id==="postDetailModal") closePostDetail(); });
    document.getElementById("closeChatMobile").addEventListener("click", function(){ activeChatId = ""; renderActive(); });
    window.addEventListener("resize", function(){ if(activeChatId) renderActive(); });
    document.getElementById("ideaFiles").addEventListener("change", function(e){
      filesToData(e.target.files).then(function(list){
        pendingIdeaAttachments = list;
        document.getElementById("ideaFilesPreview").textContent = list.length ? ("已选择: " + list.map(function(f){return f.name;}).join("、")) : "";
      });
    });
    document.getElementById("demandFiles").addEventListener("change", function(e){
      filesToData(e.target.files).then(function(list){
        pendingDemandAttachments = list;
        document.getElementById("demandFilesPreview").textContent = list.length ? ("已选择: " + list.map(function(f){return f.name;}).join("、")) : "";
      });
    });

    var quickReplyTexts = ["我想进一步了解您的专利授权细节", "请问是否有样品展示？", "方便约个时间做线上沟通吗？"];
    document.getElementById("quickReplies").innerHTML = quickReplyTexts.map(function(t){ return '<button type="button" class="quick rounded-full bg-slate-100 px-2.5 py-1 text-xs text-slate-700 hover:bg-slate-200" data-text="'+t+'">'+t+'</button>'; }).join("");
    document.querySelectorAll(".quick").forEach(function(b){
      b.addEventListener("click", function(){
        document.getElementById("msgInput").value = b.dataset.text;
        document.getElementById("msgInput").focus();
      });
    });

    function initApp(){
      if (sb) {
        sb.auth.getSession().then(function(res){
          var session = res.data.session;
          if (session) {
            hydrateUserFromSession(session).then(function(){
              authState();
              refreshAllFromSb().then(function(){
                renderPosts();
                renderHall();
                renderChats();
                renderActive();
              });
            });
          } else {
            db.current = null;
            authState();
            refreshAllFromSb().then(function(){
              renderPosts();
              renderHall();
              renderChats();
              renderActive();
            });
          }
        });
        sb.auth.onAuthStateChange(function(_event, session){
          hydrateUserFromSession(session).then(function(){
            authState();
            refreshAllFromSb().then(function(){
              renderPosts();
              renderHall();
              renderChats();
              renderActive();
            });
          });
        });
      } else {
        authState();
        renderPosts();
        renderHall();
        renderChats();
        renderActive();
      }
    }
    initApp();
  </script>
</body>
</html>
