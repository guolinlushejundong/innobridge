  <style>
    /* Contrast fix for legacy dark blocks still in page */
    .bg-slate-950,
    .bg-slate-900,
    .bg-slate-900\/95,
    .bg-slate-900\/90,
    .bg-slate-900\/75,
    .bg-slate-900\/70,
    .bg-slate-950\/60 {
      background-color: #ffffff !important;
    }
    .text-slate-100,
    .text-slate-200,
    .text-slate-300,
    .text-slate-400,
    .text-white {
      color: #0f172a !important;
    }
    .border-slate-700,
    .border-slate-800 {
      border-color: #d1d5db !important;
    }
    .bg-slate-800 {
      background-color: #f8fafc !important;
    }
    .modal-fade {
      animation: modalFadeIn 180ms ease-out;
    }
    .modal-panel {
      animation: modalSlideUp 220ms ease-out;
    }
    .post-pop {
      animation: postPop 1.1s ease-out;
    }
    .nda-locked {
      position: relative;
      overflow: hidden;
    }
    .nda-locked .nda-content {
      filter: blur(7px);
      user-select: none;
      pointer-events: none;
    }
    .nda-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .nda-unlocked .nda-content {
      filter: none;
      pointer-events: auto;
      user-select: auto;
    }
    .nda-unlocked .nda-overlay {
      display: none;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes postPop {
      0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.35); background-color: #eff6ff; }
      100% { box-shadow: 0 0 0 10px rgba(59,130,246,0); background-color: #ffffff; }
    }
    @media (max-width: 768px) {
      #panel.mobile-open {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex !important;
        flex-direction: column;
        background: #ffffff;
      }
      #panel.mobile-open #msgs {
        height: calc(100vh - 220px);
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white">
    <div class="mx-auto flex h-14 w-[94%] max-w-7xl items-center justify-between">
      <h1 class="font-semibold">InnoLink</h1>
      <nav class="flex items-center gap-2 text-sm">
        <button class="tab rounded px-2 py-1 bg-blue-600 text-white" data-page="home">首页</button>
        <button class="tab rounded px-2 py-1 border" data-page="hall">大厅</button>
        <button class="tab rounded px-2 py-1 border" data-page="publish">发布</button>
        <button class="tab rounded px-2 py-1 border" data-page="admin">审核</button>
        <button class="tab rounded px-2 py-1 border" data-page="chat">沟通</button>

        <button id="logout" class="hidden rounded bg-slate-900 px-2 py-1 text-sm text-white">退出</button>
      </div>
    </div>

          <input id="homeKeyword" class="rounded border px-2 py-2 text-sm md:col-span-2" placeholder="搜索标题、简介、发布者" />

        <div id="demandFilesPreview" class="text-xs text-slate-500"></div>
        <button class="w-full rounded bg-emerald-600 px-3 py-2 text-sm text-white">立即发布需求</button>

    function normalizeRegionName(name){
      return (name || "")
        .replace(/(特别行政区|维吾尔自治区|壮族自治区|回族自治区|自治区|省|市|自治州|地区)$/g, "")
        .trim();

    function guessProvinceAndCity(addr){
      var text = [addr.province, addr.city, addr.county, addr.state, addr.region || ""].join(" ");
      var province = "";
      var city = "";
      Object.keys(REGION_DATA).some(function(p){
        var pHit = text.indexOf(p) > -1 || text.indexOf(normalizeRegionName(p)) > -1;
        if (!pHit) return false;
        province = p;
        var cities = REGION_DATA[p] || [];
        var foundCity = cities.find(function(cn){
          return text.indexOf(cn) > -1 || text.indexOf(normalizeRegionName(cn)) > -1;
        });
        city = foundCity || (cities[0] || "");
        return true;
      });
      return { province: province, city: city };
    }
    function loadNationalRegionData(){
      var url = "https://unpkg.com/element-china-area-data@6.1.0/dist/area.json";
      return fetch(url).then(function(r){ return r.json(); }).then(function(data){
        if (!data || !data["86"]) return;
        var provincesMap = data["86"];
        var next = {};
        Object.keys(provincesMap).forEach(function(code){
          var provinceName = provincesMap[code];
          var cityMap = data[code] || {};
          var cities = Object.keys(cityMap).map(function(k){ return cityMap[k]; }).filter(Boolean);
          if (!cities.length) cities = [provinceName];
          next[provinceName] = Array.from(new Set(cities));
        });
        if (Object.keys(next).length) REGION_DATA = next;
      }).catch(function(err){
        console.warn("加载全国省市数据失败，使用内置地区数据", err);
      });
    }

    function filesToData(files){
      return Promise.all(Array.from(files || []).map(function(file){
        return new Promise(function(resolve){
          var reader = new FileReader();
          reader.onload = function(){ resolve({ name: file.name, type: file.type, size: file.size, dataUrl: reader.result }); };
          reader.readAsDataURL(file);
        });
      }));
    }
    function safeFileName(name){
      return (name || "file").replace(/[^\w.\-\u4e00-\u9fa5]/g, "_");
    }
    function uploadFilesToStorage(files){
      if (!sb) return Promise.resolve([]);
      var list = Array.from(files || []);
      if (!list.length) return Promise.resolve([]);
      return Promise.all(list.map(async function(file){
        var path = (db.current || "anon") + "/" + Date.now() + "_" + Math.random().toString(36).slice(2, 8) + "_" + safeFileName(file.name);
        var up = await sb.storage.from(SUPABASE_STORAGE_BUCKET).upload(path, file, { upsert: false });
        if (up.error) throw up.error;
        return { name: file.name, type: file.type, size: file.size, storagePath: path };
      }));
    }
    function prepareAttachmentsForSubmit(fileInputId, pendingCache){
      var input = document.getElementById(fileInputId);
      if (sb) {
        return uploadFilesToStorage(input.files).then(function(uploaded){
          return uploaded.length ? uploaded : (pendingCache || []);
        });
      }
      return filesToData(input.files).then(function(list){
        return list.length ? list : (pendingCache || []);
      });
    }
    function downloadAttachment(att){
      if (!att) return;
      if (att.dataUrl) {
        var a = document.createElement("a");
        a.href = att.dataUrl;
        a.download = att.name || "download";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        return;
      }
      if (!sb || !att.storagePath) {
        alert("当前附件不可下载");
        return;
      }
      sb.storage.from(SUPABASE_STORAGE_BUCKET).createSignedUrl(att.storagePath, 120).then(function(res){
        if (res.error || !res.data || !res.data.signedUrl) {
          alert("下载链接生成失败，请检查 Storage bucket 与权限");
          return;
        }
        var a = document.createElement("a");
        a.href = res.data.signedUrl;
        a.download = att.name || "download";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
    }

    function savePost(postType, title, category, desc, attachments, province, city){
      if(!mustLogin()) return Promise.resolve(false);
      if(!title||!category||!desc) { alert("请填写标题、分类与简介"); return Promise.resolve(false); }
      if (sb) {
        return (async function(){

          if (!uid) { alert("请先登录"); return false; }
          if(db.editId){
            var p=db.posts.find(function(x){return x.id===db.editId;});
            if(!p) return false;
            var nextAtt = attachments && attachments.length ? attachments : (p.attachments || []);
            var res = await sb.from("posts").update({
              title: title,
              category: category,
              description: desc,
              post_type: postType,
              meta: Object.assign({}, metaFromPost(p), { attachments: nextAtt, region_province: province, region_city: city, review_status: "pending", review_reason: "", review_by: "", review_at: "" }),
              badge: "待审核"
            }).eq("id", db.editId);
            if (res.error) { alert("发布失败: " + res.error.message); return false; }
          } else {
            var ins = await sb.from("posts").insert({
              author_id: uid,
              author_name: db.current,
              title: title,
              category: category,
              description: desc,
              post_type: postType,
              badge: "待审核",
              meta: Object.assign(defaultMeta(), { attachments: attachments || [], region_province: province, region_city: city, review_status: "pending", review_reason: "", review_by: "", review_at: "" })
            }).select("id").single();
            if (ins.error) { alert("发布失败: " + ins.error.message); return false; }
            recentPostId = ins.data.id;
          }
          db.editId = "";
          await fetchPostsFromSb();
          renderPosts();
          if (recentPostId) setTimeout(function(){ recentPostId = ""; renderPosts(); }, 1200);
          return true;
        })();
      }
      if(db.editId){
        var p=db.posts.find(function(x){return x.id===db.editId;});
        if(p){ p.title=title; p.category=category; p.desc=desc; p.postType=postType; p.regionProvince=province; p.regionCity=city; p.reviewStatus="pending"; p.reviewReason=""; p.reviewBy=""; p.reviewAt=""; p.badge="待审核"; p.attachments = attachments && attachments.length ? attachments : (p.attachments || []); }
      } else {
        var newId = id("p");
        recentPostId = newId;
        db.posts.push({id:newId,author:db.current,title:title,category:category,desc:desc,ts:Date.now(),postType:postType,badge:"待审核",reviewStatus:"pending",reviewReason:"",reviewBy:"",reviewAt:"",regionProvince:province,regionCity:city,attachments:attachments || [],allowDownloadAll:false,downloadRequests:[],approvedUsers:[],ndaSignedUsers:[],ndaSignLogs:[]});
      }
      db.editId = "";
      return api.save().then(function(){
        renderPosts();
        if (recentPostId) setTimeout(function(){ recentPostId = ""; renderPosts(); }, 1200);
        return true;
      });
    }

        return savePost("idea", document.getElementById("ideaTitle").value.trim(), document.getElementById("ideaCategory").value, document.getElementById("ideaDesc").value.trim(), finalFiles, document.getElementById("ideaProvince").value, document.getElementById("ideaCity").value);
      }).then(function(ok){
        if (!ok) return;
        closeModal("ideaModal");
        document.getElementById("ideaForm").reset();
        syncCityOptions("ideaProvince", "ideaCity", "城市（选填）", false);
        pendingIdeaAttachments = [];
        document.getElementById("ideaFilesPreview").textContent = "";
      }).catch(function(err){
        alert("发布失败，请稍后重试");
        console.error(err);
      });
    });

    });
    document.getElementById("homeCity").addEventListener("change", renderPosts);
    document.getElementById("homeLocate").addEventListener("click", function(){
      var locateBtn = document.getElementById("homeLocate");
      var locateTip = document.getElementById("homeLocateResult");
      var oldText = locateBtn.textContent;
      locateBtn.disabled = true;
      locateBtn.textContent = "定位中...";
      locateTip.textContent = "正在获取你当前城市，请稍候...";
      if (!navigator.geolocation) {
        locateBtn.disabled = false;
        locateBtn.textContent = oldText;
        locateTip.textContent = "";
        alert("当前浏览器不支持地理定位，请手动选择省市");
        return;
      }
      navigator.geolocation.getCurrentPosition(function(pos){
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=zh-CN&lat="+lat+"&lon="+lon)
          .then(function(r){ return r.json(); })
          .then(function(data){
            var addr = (data && data.address) || {};
            var hit = guessProvinceAndCity(addr);
            if (!hit.province) {
              locateBtn.disabled = false;
              locateBtn.textContent = oldText;
              locateTip.textContent = "";
              alert("自动定位成功，但未匹配到省市，请手动选择");
              return;
            }
            document.getElementById("homeProvince").value = hit.province;
            syncCityOptions("homeProvince", "homeCity", "全部城市", true);
            if (hit.city) document.getElementById("homeCity").value = hit.city;
            locateTip.textContent = "已定位： " + hit.province + (hit.city ? (" / " + hit.city) : "");
            locateBtn.disabled = false;
            locateBtn.textContent = oldText;
            renderPosts();
          })
          .catch(function(){
            locateBtn.disabled = false;
            locateBtn.textContent = oldText;
            locateTip.textContent = "";
            alert("定位解析失败，请手动选择省市");
          });
      }, function(err){
        locateBtn.disabled = false;
        locateBtn.textContent = oldText;
        locateTip.textContent = "";
        var msg = "定位失败，请授权地理位置权限后重试";
        if (err && err.code === 1) msg = "你拒绝了定位权限，请在浏览器中允许定位后重试";
        alert(msg);
      }, { enableHighAccuracy: false, timeout: 10000, maximumAge: 0 });
    });

    function initApp(){
      initRegionSelectors();
      loadNationalRegionData().then(function(){
        var oldHomeProvince = document.getElementById("homeProvince").value;
        var oldHomeCity = document.getElementById("homeCity").value;
        initRegionSelectors();
        if (oldHomeProvince && (oldHomeProvince === "全国" || REGION_DATA[oldHomeProvince])) {
          document.getElementById("homeProvince").value = oldHomeProvince;
          syncCityOptions("homeProvince", "homeCity", "全部城市", true);
          if (oldHomeCity) document.getElementById("homeCity").value = oldHomeCity;
        }
        renderPosts();
        renderAdmin();
      });
      if (sb) {
        sb.auth.getSession().then(function(res){
          var session = res.data.session;
          if (session) {
            hydrateUserFromSession(session).then(function(){
              authState();
              refreshAllFromSb().then(function(){
                renderPosts();
                renderHall();
                renderAdmin();
                renderChats();
                renderActive();
              });
            });
          } else {
            db.current = null;
            authState();
            refreshAllFromSb().then(function(){
              renderPosts();
              renderHall();
              renderAdmin();
              renderChats();
              renderActive();
            });
          }
        });
        sb.auth.onAuthStateChange(function(_event, session){
          hydrateUserFromSession(session).then(function(){
            authState();
            refreshAllFromSb().then(function(){
              renderPosts();
              renderHall();
              renderAdmin();
              renderChats();
              renderActive();
            });
          });
        });
      } else {
        authState();
        renderPosts();
        renderHall();
        renderAdmin();
        renderChats();
        renderActive();
      }
    }
    initApp();
